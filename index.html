<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel Studio — Sourav Dey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070a;--s1:#0c0c11;--s2:#131318;--s3:#1a1a22;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.09);
  --bf:#1C86FF;--t:#eaeaf0;--td:#6e6e80;--t3:#4a4a58;
  --blue:#1C86FF;--teal:#5ADDCF;--r:12px;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{font-size:14px}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}

/* ── Ambient orbs ── */
.orb{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px)}
.orb-1{top:-18%;left:-8%;width:420px;height:420px;background:rgba(28,134,255,.06);animation:drift 20s ease-in-out infinite alternate}
.orb-2{bottom:-12%;right:-5%;width:360px;height:360px;background:rgba(90,221,207,.045);animation:drift 24s ease-in-out infinite alternate-reverse}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(30px,20px)}}

/* ── App shell ── */
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:52px;
  border-bottom:1px solid var(--b);
  backdrop-filter:blur(20px) saturate(1.4);
  background:rgba(7,7,10,.72);
  position:sticky;top:0;z-index:10;
  animation:fadeDown .5s var(--ease) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:1rem;letter-spacing:-.2px}
.logo-mark{
  width:28px;height:28px;border-radius:8px;
  background:var(--blue);
  display:grid;place-items:center;
  font-size:.82rem;line-height:1;
  box-shadow:0 2px 12px rgba(28,134,255,.25);
}
.logo a{color:var(--teal);text-decoration:none;transition:opacity .2s}
.logo a:hover{opacity:.8}
.logo .by{color:var(--td);font-weight:400;font-size:.82rem;margin-left:1px}

.hint-pills{display:flex;gap:6px;align-items:center}
.pill{
  background:var(--s2);border:1px solid var(--b);border-radius:20px;
  padding:3px 10px;font-size:.68rem;color:var(--td);
  display:flex;align-items:center;gap:4px;
  transition:border-color .2s;
}
.pill:hover{border-color:var(--b2)}
.pill code{color:var(--teal);font-family:'Poppins',sans-serif;font-weight:600;font-size:.66rem}

/* ── Workspace ── */
.workspace{display:grid;grid-template-columns:370px 1fr;flex:1}

/* ── Panel ── */
.panel{
  border-right:1px solid var(--b);padding:22px 20px;
  overflow-y:auto;max-height:calc(100vh - 52px);
  display:flex;flex-direction:column;gap:20px;
  animation:slideIn .5s var(--ease) .1s both;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

.section{display:flex;flex-direction:column;gap:8px}
.lbl{
  font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t3);
  display:flex;align-items:center;gap:8px;
}
.lbl::after{content:'';flex:1;height:1px;background:var(--b)}

/* ── Inputs ── */
textarea,input[type="text"],input[type="number"]{
  font-family:'Poppins',sans-serif;font-size:.84rem;color:var(--t);
  background:var(--s1);border:1px solid var(--b);border-radius:var(--r);
  padding:10px 14px;outline:none;width:100%;
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease),background .25s;
}
textarea:focus,input:focus{
  border-color:rgba(28,134,255,.4);
  box-shadow:0 0 0 3px rgba(28,134,255,.08),0 1px 3px rgba(0,0,0,.2);
  background:var(--s2);
}
textarea{resize:vertical;min-height:120px;line-height:1.7}
textarea::placeholder{color:var(--td);opacity:.5}

.sub{font-size:.68rem;color:var(--td);line-height:1.5}
.sub code{
  background:rgba(90,221,207,.08);border:1px solid rgba(90,221,207,.12);
  border-radius:4px;padding:1px 5px;font-size:.64rem;color:var(--teal);
  font-family:'Poppins',sans-serif;font-weight:500;
}

.row{display:flex;gap:10px;align-items:stretch}
.col{display:flex;flex-direction:column;gap:5px;flex:1}
.col label{font-size:.66rem;font-weight:500;color:var(--td);letter-spacing:.2px}

/* ── Alignment / Segmented Controls ── */
.seg-group{display:flex;border:1px solid var(--b);border-radius:var(--r);overflow:hidden;align-self:stretch}
.seg-group button{
  flex:1;background:var(--s1);border:none;color:var(--td);
  padding:10px 0;cursor:pointer;display:grid;place-items:center;
  transition:all .2s var(--ease);font-family:'Poppins',sans-serif;font-size:.7rem;font-weight:500;
}
.seg-group button+button{border-left:1px solid var(--b)}
.seg-group button:hover{background:var(--s2);color:var(--t)}
.seg-group button.on{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(28,134,255,.3)}
.seg-group svg{width:14px;height:14px}

input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-inner-spin-button{opacity:1}

.sep{height:1px;background:var(--b);margin:2px 0}

/* ── Thumbnail strip ── */
.thumb-strip{
  display:flex;gap:8px;overflow-x:auto;padding:4px 2px;
  scroll-snap-type:x mandatory;scrollbar-width:none;
}
.thumb-strip::-webkit-scrollbar{display:none}
.thumb-item{
  flex-shrink:0;cursor:pointer;border-radius:8px;
  border:2px solid var(--b);transition:all .2s var(--ease);
  position:relative;scroll-snap-align:start;
}
.thumb-item:hover{border-color:var(--b2)}
.thumb-item.active{border-color:var(--blue);box-shadow:0 0 0 3px rgba(28,134,255,.2)}
.thumb-item canvas{border-radius:6px;display:block}
.thumb-num{
  position:absolute;bottom:3px;right:3px;
  background:rgba(0,0,0,.75);color:var(--td);
  font-size:.55rem;padding:1px 5px;border-radius:4px;font-weight:600;
}

.slide-actions{display:flex;gap:6px;align-items:center}
.sa-btn{
  font-family:'Poppins',sans-serif;font-size:.7rem;font-weight:500;
  background:var(--s1);border:1px solid var(--b);border-radius:8px;
  color:var(--td);padding:6px 12px;cursor:pointer;
  transition:all .2s var(--ease);display:flex;align-items:center;gap:4px;
}
.sa-btn:hover{background:var(--s2);color:var(--t);border-color:var(--b2)}
.sa-btn.danger:hover{color:#ff6b6b;border-color:rgba(255,107,107,.3)}
.slide-count{margin-left:auto;font-size:.68rem;color:var(--td);font-weight:500}

/* ── Export ── */
.export-wrap{display:flex;flex-direction:column;gap:8px}
.ex-main{
  flex:1;font-family:'Poppins',sans-serif;font-size:.82rem;font-weight:600;
  padding:11px 0;border:none;border-radius:var(--r);
  background:var(--blue);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .2s var(--ease);
}
.ex-main:hover{background:#1a7aee;box-shadow:0 4px 16px rgba(28,134,255,.3)}
.ex-main:active{transform:scale(.98)}
.ex-row{display:flex;gap:8px}
.ex-sec{
  flex:1;font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:500;
  padding:9px 0;border:1px solid var(--b);border-radius:var(--r);
  background:var(--bg);color:var(--t);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .2s var(--ease);
}
.ex-sec:hover{border-color:var(--b2);background:var(--s1)}
.ex-dropdown{position:relative}
.ex-dd-btn{
  font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:600;
  width:100%;padding:9px 14px;border:1px solid var(--b);
  border-radius:var(--r);
  background:var(--bg);color:var(--t);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .2s var(--ease);
}
.ex-dd-btn:hover{border-color:var(--b2);background:var(--s1)}
.ex-dd-menu{
  position:absolute;bottom:calc(100% + 6px);right:0;width:80px;
  background:var(--bg);border:1px solid var(--b2);border-radius:8px;
  padding:4px;box-shadow:0 8px 32px rgba(0,0,0,.6);
  opacity:0;transform:translateY(4px);pointer-events:none;
  transition:all .2s var(--ease);z-index:20;
}
.ex-dd-menu.open{opacity:1;transform:translateY(0);pointer-events:auto}
.ex-dd-item{
  font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:500;
  padding:7px 12px;border-radius:6px;cursor:pointer;color:var(--td);
  transition:all .15s;text-align:center;
}
.ex-dd-item:hover{background:var(--s2);color:var(--t)}
.ex-dd-item.active{color:var(--blue);font-weight:600}

/* ── Preview ── */
.preview{
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px;gap:16px;
  overflow:auto;max-height:calc(100vh - 52px);
  background:
    radial-gradient(circle at 50% 45%,rgba(28,134,255,.025) 0%,transparent 50%),
    repeating-conic-gradient(rgba(255,255,255,.015) 0% 25%,transparent 0% 50%) 0 0/22px 22px;
  animation:fadeIn .6s var(--ease) .2s both;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.preview-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.preview-wrap::before{
  content:'';position:absolute;inset:-60px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(28,134,255,.06),transparent 60%);
  pointer-events:none;z-index:-1;
  animation:pulse 6s ease-in-out infinite alternate;
}
@keyframes pulse{0%{opacity:.6;transform:scale(.95)}100%{opacity:1;transform:scale(1.05)}}

#cv{
  border-radius:6px;
  max-height:calc(100vh - 150px);width:auto;
  box-shadow:
    0 2px 4px rgba(0,0,0,.1),
    0 8px 24px rgba(0,0,0,.2),
    0 32px 72px rgba(0,0,0,.35),
    0 0 0 1px rgba(255,255,255,.03);
  transition:box-shadow .3s;
}
#cv:hover{
  box-shadow:
    0 2px 4px rgba(0,0,0,.1),
    0 12px 32px rgba(0,0,0,.25),
    0 40px 80px rgba(0,0,0,.4),
    0 0 0 1px rgba(255,255,255,.05);
}

/* ── Nav arrows ── */
.nav-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.55);border:1px solid var(--b2);
  color:var(--t);font-size:1.2rem;cursor:pointer;
  display:grid;place-items:center;
  transition:all .2s var(--ease);
  backdrop-filter:blur(8px);z-index:5;
}
.nav-prev{left:-18px}
.nav-next{right:-18px}
.nav-arrow:hover{background:var(--blue);border-color:var(--blue)}
.nav-arrow:disabled{opacity:.25;cursor:default;pointer-events:none}

.slide-counter{font-size:.78rem;color:var(--td);font-weight:500}

/* ── Toast ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(20px) scale(.96);
  background:var(--s3);border:1px solid var(--b2);border-radius:10px;
  padding:10px 22px;font-size:.78rem;font-weight:500;
  display:flex;align-items:center;gap:8px;
  opacity:0;transition:all .4s var(--ease);pointer-events:none;z-index:99;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.toast .check{color:var(--teal)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

/* ── Responsive ── */
@media(max-width:900px){
  .workspace{grid-template-columns:1fr}
  .panel{max-height:none;border-right:none;border-bottom:1px solid var(--b)}
  .preview{max-height:none;min-height:460px}
  .hint-pills{display:none}
}
@media(max-width:480px){
  header{padding:0 16px}
  .panel{padding:16px}
  .preview{padding:20px}
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-mark">📑</div>
      Carousel Studio
      <span class="by">by <a href="https://Souravdey.space" target="_blank" rel="noopener" style="color:var(--blue)">Sourav Dey</a></span>
    </div>
    <div class="hint-pills">
      <div class="pill"><code>**text**</code> gradient</div>
      <div class="pill"><code>← →</code> navigate slides</div>
    </div>
  </header>

  <div class="workspace">
    <div class="panel">

      <!-- Slides -->
      <div class="section">
        <div class="lbl">Slides</div>
        <div class="thumb-strip" id="thumbStrip"></div>
        <div class="slide-actions">
          <button class="sa-btn" id="addBtn" title="Add slide">+ Add</button>
          <button class="sa-btn" id="dupeBtn" title="Duplicate slide">⧉ Dupe</button>
          <button class="sa-btn danger" id="removeBtn" title="Remove slide">✕ Remove</button>
          <span class="slide-count" id="slideCount"></span>
        </div>
      </div>

      <div class="sep"></div>

      <!-- Content -->
      <div class="section">
        <div class="lbl">Content</div>
        <textarea id="content" spellcheck="false" placeholder="Write your slide text...&#10;Wrap words in **stars** for gradient"></textarea>
        <div class="sub">Wrap text in <code>**double stars**</code> for gradient highlight. Empty lines add spacing.</div>
      </div>

      <div class="sep"></div>

      <!-- Typography -->
      <div class="section">
        <div class="lbl">Typography</div>
        <div class="row">
          <div class="col">
            <label>Alignment</label>
            <div class="seg-group" id="alignGroup">
              <button data-v="left" title="Left"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="2" y1="3" x2="14" y2="3"/><line x1="2" y1="7" x2="10" y2="7"/><line x1="2" y1="11" x2="14" y2="11"/><line x1="2" y1="15" x2="8" y2="15"/></svg></button>
              <button data-v="center" title="Center"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="1" y1="3" x2="15" y2="3"/><line x1="3" y1="7" x2="13" y2="7"/><line x1="1" y1="11" x2="15" y2="11"/><line x1="4" y1="15" x2="12" y2="15"/></svg></button>
              <button data-v="right" title="Right"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="2" y1="3" x2="14" y2="3"/><line x1="6" y1="7" x2="14" y2="7"/><line x1="2" y1="11" x2="14" y2="11"/><line x1="8" y1="15" x2="14" y2="15"/></svg></button>
            </div>
          </div>
          <div class="col">
            <label>Font size</label>
            <input type="number" id="fontSize" value="48" min="18" max="80" step="1">
          </div>
        </div>
      </div>

      <div class="sep"></div>

      <!-- Author -->
      <div class="section">
        <div class="lbl">Author</div>
        <div class="col"><label>Name</label><input type="text" id="authorName" value="Sourav Dey"></div>
        <div class="col"><label>Website</label><input type="text" id="authorUrl" value="https://www.Souravdey.Space"></div>
      </div>

      <div class="sep"></div>

      <!-- Settings -->
      <div class="section">
        <div class="lbl">Settings</div>
        <div class="row">
          <div class="col">
            <label>Dimensions</label>
            <div class="seg-group" id="dimGroup">
              <button data-v="portrait" class="on">4:5</button>
              <button data-v="square">1:1</button>
            </div>
          </div>
          <div class="col">
            <label>Page numbers</label>
            <div class="seg-group" id="pageNumGroup">
              <button data-v="fraction" class="on">1/5</button>
              <button data-v="none">Off</button>
            </div>
          </div>
        </div>
      </div>

      <div class="sep"></div>

      <!-- Export -->
      <div class="section">
        <div class="lbl">Export</div>
        <div class="export-wrap">
          <button class="ex-main" id="exportPdfBtn">
            <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M8 10.5l-3.5-3.5h2.5v-5h2v5h2.5zM2 12h12v2H2z"/></svg>
            <span>Export PDF</span>
          </button>
          <div class="ex-row">
            <button class="ex-sec" id="exportSlideBtn">Export Slide</button>
            <div class="ex-dropdown" id="fmtDrop">
              <button class="ex-dd-btn" id="fmtBtn">
                <span id="fmtLabel">PNG</span>
                <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 4.5 6 7.5 9 4.5"/></svg>
              </button>
              <div class="ex-dd-menu" id="fmtMenu">
                <div class="ex-dd-item active" data-fmt="png">PNG</div>
                <div class="ex-dd-item" data-fmt="jpg">JPG</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Preview -->
    <div class="preview">
      <div class="preview-wrap">
        <canvas id="cv" width="1080" height="1350"></canvas>
        <button class="nav-arrow nav-prev" id="navPrev">&#8249;</button>
        <button class="nav-arrow nav-next" id="navNext">&#8250;</button>
      </div>
      <div class="slide-counter" id="slideCounter">1 / 3</div>
    </div>
  </div>
</div>

const C={w:'#FFFFFF',url:'#bbbbbb',blue:'#1C86FF',teal:'#5ADDCF',card:'#000000'};

const DIMS={
  portrait:{w:1080,h:1350},
  square:{w:1080,h:1080},
};

function getLayout(){
  const d=DIMS[state.dimMode];
  const PAD=64,r=24,ip=80;
  const cw=d.w,ch=d.h;
  const cardW=cw-PAD*2, cardH=ch-PAD*2;
  const footerH=180;
  const divY=PAD+cardH-footerH;
  return{
    cw,ch,
    card:{x:PAD,y:PAD,w:cardW,h:cardH,r,pad:ip},
    footer:{
      divY,
      cx:PAD+ip+30,
      cy:PAD+cardH-100,
      r:30,
      tx:PAD+ip+72,
      ny:PAD+cardH-110,
      uy:PAD+cardH-84,
    },
    pageInd:{y:PAD+48,fontSize:18},
    textZone:{top:PAD+100,bottom:divY-40},
  };
}

// Parse **gradient**
function parse(t){
  const r=/\*\*(.+?)\*\*/g,o=[];let l=0,m;
  while((m=r.exec(t))!==null){
    if(m.index>l)o.push({t:t.slice(l,m.index),g:0});
    o.push({t:m[1],g:1});l=r.lastIndex;
  }
  if(l<t.length)o.push({t:t.slice(l),g:0});
  if(!o.length)o.push({t,g:0});
  return o;
}

function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function drawSlide(c,slide,index,total){
  const L=getLayout();
  const cw=L.cw,ch=L.ch;

  c.clearRect(0,0,cw,ch);

  // BG gradient
  const bg=c.createLinearGradient(0,ch,0,0);
  bg.addColorStop(.377,C.blue);bg.addColorStop(.946,C.teal);
  c.fillStyle=bg;c.fillRect(0,0,cw,ch);

  // Card shadow
  c.save();c.shadowColor='rgba(0,0,0,.65)';c.shadowBlur=150;c.shadowOffsetX=0;c.shadowOffsetY=44;
  rr(c,L.card.x,L.card.y,L.card.w,L.card.h,L.card.r);c.fillStyle=C.card;c.fill();c.restore();

  // Card
  rr(c,L.card.x,L.card.y,L.card.w,L.card.h,L.card.r);c.fillStyle=C.card;c.fill();

  // Page indicator
  if(state.showPageNumbers&&total>1){
    const piText=`${String(index+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
    c.font=`500 ${L.pageInd.fontSize}px Poppins,sans-serif`;
    c.fillStyle='rgba(255,255,255,.35)';
    c.textAlign='right';
    c.fillText(piText,L.card.x+L.card.w-L.card.pad,L.pageInd.y);
    c.textAlign='left';
  }

  // Text content
  const fs=slide.fontSize,lh=fs*1.25;
  const font=`600 ${fs}px Poppins,sans-serif`;
  c.font=font;

  const showFooter=slide.type==='cover'||slide.type==='closing';
  const contentBottom=showFooter?L.footer.divY-40:L.card.y+L.card.h-L.card.pad;
  const contentTop=L.textZone.top;
  const raw=slide.text.split('\n');
  const totalH=raw.length*lh;
  const area=contentBottom-contentTop;
  const sy=contentTop+(area-totalH)/2+fs*.7;

  const innerL=L.card.x+L.card.pad;
  const innerR=L.card.x+L.card.w-L.card.pad;
  const innerW=innerR-innerL;

  function alignX(lw){
    return slide.align==='left'?innerL:slide.align==='center'?innerL+(innerW-lw)/2:innerR-lw;
  }

  raw.forEach((line,i)=>{
    if(!line.trim())return;
    const segs=parse(line);
    c.font=font;
    const w=segs.reduce((a,s)=>a+c.measureText(s.t).width,0);
    let cx=alignX(w);const y=sy+i*lh;
    for(const s of segs){
      const sw=c.measureText(s.t).width;
      if(s.g){const g=c.createLinearGradient(cx+sw,y,cx,y);g.addColorStop(.17,C.teal);g.addColorStop(.74,C.blue);c.fillStyle=g}
      else c.fillStyle=C.w;
      c.fillText(s.t,cx,y);cx+=sw;
    }
  });

  // Footer (cover + closing only)
  if(showFooter){
    // Divider
    const dg=c.createLinearGradient(innerL,0,innerR,0);
    dg.addColorStop(0,C.blue);dg.addColorStop(1,C.teal);
    c.fillStyle=dg;c.fillRect(innerL,L.footer.divY,innerW,2);

    // Avatar
    if(avatar.complete&&avatar.naturalWidth){
      c.save();c.beginPath();c.arc(L.footer.cx,L.footer.cy,L.footer.r,0,Math.PI*2);
      c.clip();c.drawImage(avatar,L.footer.cx-L.footer.r,L.footer.cy-L.footer.r,L.footer.r*2,L.footer.r*2);c.restore();
    }

    // Name & URL
    c.font='600 22px Poppins,sans-serif';c.fillStyle=C.w;c.fillText(state.author.name,L.footer.tx,L.footer.ny);
    c.font='400 17px Poppins,sans-serif';c.fillStyle=C.url;c.fillText(state.author.url,L.footer.tx,L.footer.uy);
  }
}

// Thumbnail rendering
const THUMB_SCALE=0.08;
function renderThumbnails(){
  const strip=$('thumbStrip');
  const L=getLayout();
  const tw=Math.round(L.cw*THUMB_SCALE);
  const th=Math.round(L.ch*THUMB_SCALE);
  const total=state.slides.length;

  // Rebuild if count changed
  while(strip.children.length>total)strip.lastChild.remove();
  while(strip.children.length<total){
    const item=document.createElement('div');
    item.className='thumb-item';
    const tc=document.createElement('canvas');
    tc.width=tw;tc.height=th;
    item.appendChild(tc);
    const num=document.createElement('div');
    num.className='thumb-num';
    item.appendChild(num);
    strip.appendChild(item);
  }

  // Render each
  for(let i=0;i<total;i++){
    const item=strip.children[i];
    const tc=item.querySelector('canvas');
    tc.width=tw;tc.height=th;
    const tctx=tc.getContext('2d');
    tctx.save();tctx.scale(THUMB_SCALE,THUMB_SCALE);
    drawSlide(tctx,state.slides[i],i,total);
    tctx.restore();
    item.querySelector('.thumb-num').textContent=i+1;
    item.classList.toggle('active',i===state.currentIndex);
    item.onclick=()=>switchToSlide(i);
  }
}

function render(){
  const L=getLayout();
  canvas.width=L.cw;canvas.height=L.ch;
  drawSlide(ctx,state.slides[state.currentIndex],state.currentIndex,state.slides.length);
  renderThumbnails();
  updateNav();
}

function updateNav(){
  const i=state.currentIndex,n=state.slides.length;
  $('navPrev').disabled=i===0;
  $('navNext').disabled=i===n-1;
  $('slideCounter').textContent=`${i+1} / ${n}`;
  $('slideCount').textContent=`${n} / 10`;
}

function populateInputs(){
  const s=state.slides[state.currentIndex];
  $('content').value=s.text;
  $('fontSize').value=s.fontSize;
  // Update alignment buttons
  $('alignGroup').querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.v===s.align));
}

function switchToSlide(i){
  if(i<0||i>=state.slides.length)return;
  state.currentIndex=i;
  populateInputs();
  render();
  // Scroll thumbnail into view
  const item=$('thumbStrip').children[i];
  if(item)item.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'});
}

// Slide management
function addSlide(){
  if(state.slides.length>=10){toast('Maximum 10 slides');return}
  const ns={id:Date.now(),text:'',type:'content',fontSize:42,align:'left'};
  state.slides.splice(state.currentIndex+1,0,ns);
  switchToSlide(state.currentIndex+1);
}

function duplicateSlide(){
  if(state.slides.length>=10){toast('Maximum 10 slides');return}
  const clone={...state.slides[state.currentIndex],id:Date.now()};
  state.slides.splice(state.currentIndex+1,0,clone);
  switchToSlide(state.currentIndex+1);
  toast('Slide duplicated');
}

function removeSlide(){
  if(state.slides.length<=2){toast('Minimum 2 slides');return}
  state.slides.splice(state.currentIndex,1);
  if(state.currentIndex>=state.slides.length)state.currentIndex=state.slides.length-1;
  switchToSlide(state.currentIndex);
  toast('Slide removed');
}

// Events — per-slide inputs
$('content').addEventListener('input',e=>{state.slides[state.currentIndex].text=e.target.value;render()});
$('fontSize').addEventListener('input',e=>{state.slides[state.currentIndex].fontSize=parseInt(e.target.value)||42;render()});

$('alignGroup').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  $('alignGroup').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  state.slides[state.currentIndex].align=b.dataset.v;
  render();
});

// Author (shared)
$('authorName').addEventListener('input',e=>{state.author.name=e.target.value;render()});
$('authorUrl').addEventListener('input',e=>{state.author.url=e.target.value;render()});

// Settings
$('dimGroup').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  $('dimGroup').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  state.dimMode=b.dataset.v;
  render();
});

$('pageNumGroup').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  $('pageNumGroup').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  state.showPageNumbers=b.dataset.v==='fraction';
  render();
});

// Slide management buttons
$('addBtn').addEventListener('click',addSlide);
$('dupeBtn').addEventListener('click',duplicateSlide);
$('removeBtn').addEventListener('click',removeSlide);

// Nav arrows
$('navPrev').addEventListener('click',()=>switchToSlide(state.currentIndex-1));
$('navNext').addEventListener('click',()=>switchToSlide(state.currentIndex+1));

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();switchToSlide(state.currentIndex-1)}
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();switchToSlide(state.currentIndex+1)}
});

// Toast
function toast(msg){
  const el=$('toast');$('toastMsg').textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200);
}

// Export format dropdown
let exportFmt='png';
$('fmtBtn').addEventListener('click',e=>{e.stopPropagation();$('fmtMenu').classList.toggle('open')});
$('fmtMenu').addEventListener('click',e=>{
  const item=e.target.closest('.ex-dd-item');if(!item)return;
  exportFmt=item.dataset.fmt;
  $('fmtLabel').textContent=exportFmt.toUpperCase();
  $('fmtMenu').querySelectorAll('.ex-dd-item').forEach(x=>x.classList.remove('active'));
  item.classList.add('active');
  $('fmtMenu').classList.remove('open');
});
document.addEventListener('click',()=>$('fmtMenu').classList.remove('open'));

// Export PDF
$('exportPdfBtn').addEventListener('click',async()=>{
  const{jsPDF}=window.jspdf;
  const L=getLayout();
  const pxToMm=25.4/150;
  const pageW=L.cw*pxToMm,pageH=L.ch*pxToMm;
  const pdf=new jsPDF({orientation:L.ch>L.cw?'portrait':'landscape',unit:'mm',format:[pageW,pageH]});
  const off=document.createElement('canvas');off.width=L.cw;off.height=L.ch;
  const offCtx=off.getContext('2d');
  for(let i=0;i<state.slides.length;i++){
    if(i>0)pdf.addPage([pageW,pageH]);
    drawSlide(offCtx,state.slides[i],i,state.slides.length);
    const imgData=off.toDataURL('image/jpeg',.92);
    pdf.addImage(imgData,'JPEG',0,0,pageW,pageH);
  }
  pdf.save('carousel.pdf');
  toast('Exported as PDF');
});

// Export single slide
$('exportSlideBtn').addEventListener('click',()=>{
  const L=getLayout();
  const off=document.createElement('canvas');off.width=L.cw;off.height=L.ch;
  const offCtx=off.getContext('2d');
  drawSlide(offCtx,state.slides[state.currentIndex],state.currentIndex,state.slides.length);
  const a=document.createElement('a');
  a.download=`slide-${state.currentIndex+1}.${exportFmt}`;
  a.href=off.toDataURL(exportFmt==='jpg'?'image/jpeg':'image/png',.95);
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast(`Slide ${state.currentIndex+1} exported as ${exportFmt.toUpperCase()}`);
});

// Init
populateInputs();
render();
</script>
</body>
</html>
